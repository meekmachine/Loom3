name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Build
            command: npm run build
          - name: Typecheck
            command: npm run typecheck
          - name: Test
            command: npm test
    name: ${{ matrix.check.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.command }}

  release_smoke:
    if: ${{ !github.event.pull_request.draft }}
    name: Release smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # main publishes from a synthetic patch-bump commit created in prepare_release,
      # so the PR check must simulate that commit instead of validating the stale PR version.
      - name: Prepare simulated release commit
        id: release
        run: bash ./scripts/ci/prepare-release-commit.sh

      - name: Validate release tag creation
        run: |
          bash ./scripts/ci/create-release-tag.sh \
            --tag "${{ steps.release.outputs.tag }}" \
            --commit "${{ steps.release.outputs.release_sha }}" \
            --dry-run
