name: Publish to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    if: "${{ github.event_name == 'push' && github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'build: bump npm package version') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_sha: ${{ steps.bump.outputs.release_sha }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: "${{ github.ref_name }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p 'require("./package.json").version')
          git add package.json package-lock.json
          git commit -m "build: bump npm package version to ${VERSION}"
          git push origin HEAD:main
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    if: "${{ always() && (github.event_name == 'workflow_dispatch' || needs.prepare_release.outputs.release_sha != '') }}"
    needs: prepare_release
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: "${{ github.event_name == 'workflow_dispatch' && github.sha || needs.prepare_release.outputs.release_sha }}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p 'require(\"./package.json\").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: release
        run: |
          echo "tag=v${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify NPM auth
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_KEY is not configured for this workflow environment."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Check if version already exists on NPM
        id: existing
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} is not published yet."
          fi

      - name: Verify release tag drift
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          commit="$(git rev-parse HEAD)"
          remote_commit="$(git ls-remote --tags origin "refs/tags/${tag}^{}" | awk '{print $1}')"

          if [ -z "$remote_commit" ]; then
            remote_commit="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}')"
          fi

          if [ -n "$remote_commit" ] && [ "$remote_commit" != "$commit" ]; then
            echo "Tag ${tag} points to ${remote_commit}, expected ${commit}." >&2
            exit 1
          fi

      - name: Publish to NPM
        id: publish_npm
        if: steps.existing.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      # Package version is the source of truth; create the release tag when it is missing,
      # but fail if an existing tag already points at a different commit.
      - name: Create release tag
        if: ${{ steps.existing.outputs.exists == 'true' || steps.publish_npm.outcome == 'success' }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          commit="$(git rev-parse HEAD)"
          remote_commit="$(git ls-remote --tags origin "refs/tags/${tag}^{}" | awk '{print $1}')"

          if [ -z "$remote_commit" ]; then
            remote_commit="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}')"
          fi

          if [ -z "$remote_commit" ]; then
            git tag -a "$tag" -m "Release $tag" "$commit"
            git push origin "$tag"
          fi

      - name: Create or update GitHub release
        if: ${{ steps.existing.outputs.exists == 'true' || steps.publish_npm.outcome == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.release.outputs.commit }}
          name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          body: |
            ## NPM Package

            Install: `npm install @lovelace_lol/loom3@${{ steps.pkg.outputs.version }}`

            Reference: [npmjs.com/package/@lovelace_lol/loom3](https://www.npmjs.com/package/@lovelace_lol/loom3)
