<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a31"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#10172b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6dd3ce"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .body { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .mono { font: 500 20px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .mono-small { font: 500 16px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .tiny { font: 600 14px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #95a4c4; }
      .chip { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0b1020; }
      .card { fill: url(#panelGrad); stroke: #2a395f; stroke-width: 2; rx: 24; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <text x="72" y="88" class="title">Presets route Action Units into morphs and bones</text>
  
      <text x="72" y="122" class="subtitle">The preset is the translation layer between a FACS-style API and your model-specific rig.</text>
      <rect x="84" y="230" width="250" height="120" rx="24" fill="#112946" stroke="#244d79" stroke-width="2"/>
      <text x="116" y="280" class="label">AU inputs</text>
      <rect x="116" y="300" width="60" height="32" rx="16" fill="#6dd3ce"/><text x="136" y="322" class="chip">AU12</text>
      <rect x="186" y="300" width="60" height="32" rx="16" fill="#f5b971"/><text x="206" y="322" class="chip">AU45</text>
      <rect x="256" y="300" width="60" height="32" rx="16" fill="#8aa7ff"/><text x="276" y="322" class="chip">AU51</text>
      <rect x="460" y="170" width="650" height="500" rx="30" fill="url(#panelGrad)" stroke="#2a395f" stroke-width="2" filter="url(#shadow)"/>
      <text x="500" y="228" class="label">CC4_PRESET</text>
      <text x="500" y="270" class="body">Maps AUs to morph targets, bone bindings, mesh routing, visemes, and default mix weights.</text>
      <rect x="500" y="312" width="270" height="280" rx="22" fill="#0d1426" stroke="#22314f" stroke-width="1.5"/>
      <text x="530" y="356" class="mono-small">auToMorphs[12]</text>
      <text x="530" y="390" class="mono-small">left  → Mouth_Smile_L</text>
      <text x="530" y="424" class="mono-small">right → Mouth_Smile_R</text>
      <text x="530" y="458" class="mono-small">center → Smile</text>
      <rect x="800" y="312" width="270" height="280" rx="22" fill="#0d1426" stroke="#22314f" stroke-width="1.5"/>
      <text x="830" y="356" class="mono-small">auToBones[51]</text>
      <text x="830" y="390" class="mono-small">HEAD → ry @ 30°</text>
      <text x="830" y="424" class="mono-small">NECK → ry @ 12°</text>
      <text x="830" y="458" class="mono-small">EYES → continuum pairs</text>
      <rect x="1234" y="230" width="280" height="120" rx="24" fill="#14332f" stroke="#2d7267" stroke-width="2"/>
      <text x="1264" y="278" class="label">Morph output</text>
      <text x="1264" y="312" class="body">Blend shapes on the face, tongue, and eye meshes.</text>
      <rect x="1234" y="420" width="280" height="120" rx="24" fill="#332314" stroke="#73522d" stroke-width="2"/>
      <text x="1264" y="468" class="label">Bone output</text>
      <text x="1264" y="502" class="body">Composite rotations for head, jaw, eyes, and custom rigs.</text>
      <path d="M334 290 C390 290 404 290 460 290" stroke="#6dd3ce" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
      <path d="M1110 360 C1172 360 1178 300 1234 290" stroke="#6dd3ce" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
      <path d="M1110 470 C1172 470 1178 480 1234 480" stroke="#6dd3ce" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
    
</svg>