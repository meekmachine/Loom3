<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a31"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#10172b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6dd3ce"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .body { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .mono { font: 500 20px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .mono-small { font: 500 16px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .tiny { font: 600 14px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #95a4c4; }
      .chip { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0b1020; }
      .card { fill: url(#panelGrad); stroke: #2a395f; stroke-width: 2; rx: 24; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <text x="72" y="88" class="title">mergePreset lets you extend a base profile surgically</text>
  
      <text x="72" y="122" class="subtitle">Keep the shipped preset, override the few entries you care about, and reuse everything else unchanged.</text>
      <rect x="94" y="220" width="360" height="420" rx="28" fill="url(#panelGrad)" stroke="#2a395f" stroke-width="2" filter="url(#shadow)"/>
      <text x="126" y="278" class="label">CC4_PRESET</text>
      <text x="126" y="322" class="body">Ships with:</text>
      <text x="126" y="360" class="mono-small">• 80+ AU morph mappings</text>
      <text x="126" y="394" class="mono-small">• composite bone rotations</text>
      <text x="126" y="428" class="mono-small">• viseme keys and mesh routing</text>
      <text x="126" y="462" class="mono-small">• AU metadata and mix defaults</text>
      <rect x="620" y="260" width="360" height="340" rx="28" fill="#10203a" stroke="#22426e" stroke-width="2" filter="url(#shadow)"/>
      <text x="652" y="318" class="label">mergePreset(…, overrides)</text>
      <text x="652" y="366" class="mono-small">auToMorphs[12] → custom smile</text>
      <text x="652" y="400" class="mono-small">auToBones[99] → custom neck turn</text>
      <text x="652" y="434" class="mono-small">boneNodes.HEAD → model-specific name</text>
      <text x="652" y="468" class="mono-small">visemeKeys → keep inherited defaults</text>
      <rect x="1146" y="220" width="360" height="420" rx="28" fill="url(#panelGrad)" stroke="#2a395f" stroke-width="2" filter="url(#shadow)"/>
      <text x="1178" y="278" class="label">MY_PRESET</text>
      <text x="1178" y="322" class="body">Result:</text>
      <text x="1178" y="360" class="mono-small">✓ inherited mappings stay intact</text>
      <text x="1178" y="394" class="mono-small">✓ only overrides are replaced</text>
      <text x="1178" y="428" class="mono-small">✓ safe to swap at runtime</text>
      <text x="1178" y="462" class="mono-small">✓ easier to version per character</text>
      <path d="M454 430 C522 430 548 430 620 430" stroke="#6dd3ce" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
      <path d="M980 430 C1048 430 1074 430 1146 430" stroke="#6dd3ce" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
      <text x="698" y="660" class="body">Override the delta, not the entire preset blob.</text>
    
</svg>