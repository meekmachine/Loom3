<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a31"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#10172b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6dd3ce"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .body { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .mono { font: 500 20px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .mono-small { font: 500 16px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .tiny { font: 600 14px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #95a4c4; }
      .chip { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0b1020; }
      .card { fill: url(#panelGrad); stroke: #2a395f; stroke-width: 2; rx: 24; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <text x="72" y="88" class="title">Render-order fixes are usually about layer priority, not rigging</text>
  
      <text x="72" y="122" class="subtitle">Loom3 exposes material config so face meshes, brows, occlusion shells, and hair can be layered intentionally.</text>
      <rect x="90" y="190" width="650" height="620" rx="28" fill="url(#panelGrad)" stroke="#2a395f" stroke-width="2" filter="url(#shadow)"/>
      <text x="130" y="246" class="label">Before</text>
      <text x="130" y="280" class="body">Hair and brow shells fight for the same draw order.</text>
      <ellipse cx="412" cy="488" rx="170" ry="210" fill="#1a2c48"/>
      <rect x="286" y="310" width="252" height="110" rx="30" fill="#7c3aed" fill-opacity="0.25" stroke="#a78bfa" stroke-width="2"/>
      <text x="354" y="374" class="label">Hair mesh</text>
      <rect x="332" y="420" width="160" height="42" rx="20" fill="#f27f7f" fill-opacity="0.7"/>
      <text x="362" y="448" class="chip">Brows hidden</text>
      <text x="130" y="706" class="mono-small">renderOrder = 0 on both layers</text>
      <rect x="860" y="190" width="650" height="620" rx="28" fill="url(#panelGrad)" stroke="#2a395f" stroke-width="2" filter="url(#shadow)"/>
      <text x="900" y="246" class="label">After</text>
      <text x="900" y="280" class="body">Brows, face shells, and hair get explicit ordering.</text>
      <ellipse cx="1182" cy="488" rx="170" ry="210" fill="#1a2c48"/>
      <rect x="1056" y="310" width="252" height="110" rx="30" fill="#7c3aed" fill-opacity="0.18" stroke="#a78bfa" stroke-width="2"/>
      <rect x="1082" y="394" width="200" height="42" rx="20" fill="#f27f7f" fill-opacity="0.85"/>
      <text x="1134" y="422" class="chip">Brows in front</text>
      <text x="900" y="686" class="mono-small">Face shell: -20   Base face: 0   Hair: 5</text>
      <path d="M542 650 C640 650 730 650 830 650" stroke="#6dd3ce" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
    
</svg>