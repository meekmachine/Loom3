<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a31"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#10172b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6dd3ce"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #e8edf7; }
      .body { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95a4c4; }
      .mono { font: 500 20px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .mono-small { font: 500 16px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #e8edf7; }
      .tiny { font: 600 14px 'SF Mono', Menlo, Monaco, Consolas, monospace; fill: #95a4c4; }
      .chip { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0b1020; }
      .card { fill: url(#panelGrad); stroke: #2a395f; stroke-width: 2; rx: 24; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <text x="72" y="88" class="title">Every animated change runs through a transition handle</text>
  
      <text x="72" y="122" class="subtitle">You get a promise for completion plus pause, resume, and cancel controls on the same handle.</text>
      <rect x="110" y="210" width="1380" height="520" rx="30" fill="url(#panelGrad)" stroke="#2a395f" stroke-width="2" filter="url(#shadow)"/>
      <line x1="180" y1="560" x2="1420" y2="560" stroke="#50658f" stroke-width="4"/>
      <text x="170" y="598" class="tiny">0ms</text>
      <text x="555" y="598" class="tiny">120ms</text>
      <text x="850" y="598" class="tiny">240ms</text>
      <text x="1120" y="598" class="tiny">320ms</text>
      <text x="1380" y="598" class="tiny">400ms</text>
      <path d="M180 560 C260 560 280 520 360 470 C450 414 520 360 660 340 C820 316 930 248 1040 222 C1130 200 1260 190 1420 190" stroke="#6dd3ce" stroke-width="8" fill="none"/>
      <circle cx="180" cy="560" r="12" fill="#6dd3ce"/><circle cx="660" cy="340" r="12" fill="#f5b971"/><circle cx="1040" cy="222" r="12" fill="#8aa7ff"/><circle cx="1420" cy="190" r="12" fill="#78d49a"/>
      <text x="204" y="538" class="body">start</text>
      <text x="688" y="320" class="body">pause()</text>
      <text x="1068" y="204" class="body">resume()</text>
      <text x="1300" y="158" class="body">promise resolves</text>
      <rect x="180" y="654" width="360" height="52" rx="16" fill="#10203a" stroke="#22426e" stroke-width="1.5"/>
      <text x="206" y="687" class="mono-small">const handle = loom.transitionAU(12, 0.8, 400);</text>
      <rect x="576" y="654" width="280" height="52" rx="16" fill="#281827" stroke="#6c365d" stroke-width="1.5"/>
      <text x="604" y="687" class="mono-small">handle.pause()</text>
      <rect x="894" y="654" width="280" height="52" rx="16" fill="#182928" stroke="#2f6d68" stroke-width="1.5"/>
      <text x="922" y="687" class="mono-small">handle.resume()</text>
      <rect x="1212" y="654" width="220" height="52" rx="16" fill="#291818" stroke="#7c3c3c" stroke-width="1.5"/>
      <text x="1240" y="687" class="mono-small">handle.cancel()</text>
    
</svg>